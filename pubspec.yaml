name: fayow
description: FaYoW - Points d'intérêt géolocalisés
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.0

  # Carte
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Localisation
  geolocator: ^10.1.0
  flutter_background_geolocation: ^4.16.0

  # Réseau
  http: ^1.2.0

  # TTS
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

